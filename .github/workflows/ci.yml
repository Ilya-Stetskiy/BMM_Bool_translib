name: CI

# На каждый push/PR: сборка + запуск тестов + обновление STATUS.md.
# SKIP не считается ошибкой (функция ещё не реализована — ожидаемо, пока
# идёт работа команды) — красным CI падает только на FAIL (реализованная
# функция считает неправильно) или на ошибку компиляции (см.
# generate_status.sh: exit 1 при FAIL_COUNT>0, иначе 0).
#
# ВНИМАНИЕ про раннер: у проекта тяжёлые специфические зависимости
# (mockturtle/Sylvan/BRiAl/CaDiCaL/kissat, CUDA-based образ с SageMath —
# см. coder-deploy/workspace-image/Dockerfile), собранные заранее в образе
# genetica-boolean-lib. Этот образ собирается ЛОКАЛЬНО на том же Docker-
# хосте, что и Coder workspace'ы (см. coder-deploy/docker-compose.yml) — он
# нигде не запушен в реестр, и он большой (CUDA devel + conda/Sage), так
# что пересобирать его с нуля на стандартном github-hosted раннере на
# каждый CI-прогон рискует не поместиться в лимит диска раннера (~14GB) и
# в любом случае будет медленно даже с кэшем слоёв.
#
# Поэтому CI здесь по умолчанию рассчитан на self-hosted раннер,
# зарегистрированный на ТОМ ЖЕ Docker-хосте, что и genetica-coder (образ
# genetica-boolean-lib уже собран локально, тянуть/пересобирать его не
# нужно). Если self-hosted раннера нет — замените `runs-on` на
# `ubuntu-latest` и добавьте шаг сборки образа через
# `docker/build-push-action` с `cache-from/cache-to: type=gha` (сборка
# первого прогона будет долгой, но закэшируется).

on:
  push:
  pull_request:

jobs:
  build-and-test:
    runs-on: [self-hosted, genetica-boolean-lib]  # см. предупреждение выше
    container:
      image: genetica-boolean-lib:latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=RelWithDebInfo

      - name: Build
        run: cmake --build build --parallel

      - name: Test (SKIP допустим, FAIL — нет)
        run: ctest --test-dir build --output-on-failure

      - name: Generate STATUS.md
        run: cmake --build build --target status

      - name: Upload STATUS.md
        uses: actions/upload-artifact@v4
        with:
          name: STATUS.md
          path: STATUS.md
